{% extends 'userbase.html' %}
{% load static %}
{% block user %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow border-0 rounded-4 text-center">
                <div class="card-body p-5">

                    <img src="{% static 'images/logout.png' %}" width="100" class="mb-3">

                    <h2 class="fw-bold text-danger">Logout</h2>
                    <p class="text-muted">Are you sure you want to logout?</p>

                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="/logout/" class="btn btn-danger px-4">
                            Yes, Logout
                        </a>

                        <a href="/userapp/userdash/" class="btn btn-secondary px-4">
                            Cancel
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
