{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0ea5e9,#22c55e,#06b6d4);
font-family:Segoe UI,sans-serif;
padding:20px;
}

/* Glass Card */
.register-box{
width:100%;
max-width:950px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.25);
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.15);
display:grid;
grid-template-columns:1fr 1fr;
}

/* Left Side */
.left-side{
padding:50px;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
}

.left-side h1{
font-size:42px;
font-weight:800;
margin-bottom:15px;
}

.left-side p{
font-size:16px;
line-height:1.6;
opacity:.9;
}

.left-side img{
width:100%;
max-width:280px;
margin-top:25px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* Right Side */
.right-side{
padding:45px;
background:#fff;
}

.right-side h2{
font-size:32px;
font-weight:800;
color:#0f172a;
margin-bottom:20px;
text-align:center;
}

.form-group{
margin-bottom:18px;
}

.form-label{
font-weight:600;
margin-bottom:6px;
color:#334155;
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
top:50%;
left:14px;
transform:translateY(-50%);
color:#64748b;
font-size:16px;
}

.input-box input{
width:100%;
padding:12px 14px 12px 42px;
border:1px solid #dbeafe;
border-radius:12px;
outline:none;
transition:.3s;
}

.input-box input:focus{
border-color:#22c55e;
box-shadow:0 0 0 4px rgba(34,197,94,.12);
}

.btn-register{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#16a34a,#22c55e);
color:#fff;
font-weight:700;
font-size:16px;
transition:.3s;
}

.btn-register:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(34,197,94,.25);
}

.login-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.login-link a{
text-decoration:none;
font-weight:700;
color:#16a34a;
}

/* Alert */
.alert{
border-radius:12px;
}

/* Responsive */
@media(max-width:900px){
.register-box{
grid-template-columns:1fr;
}
.left-side{
display:none;
}
.right-side{
padding:30px;
}
}
</style>
</head>

<body>

<div class="register-box">

<!-- Left Side -->
<div class="left-side">
<h1>Join Us Today 🚀</h1>
<p>Create your account and start exploring books, offers, and premium services with a beautiful shopping experience.</p>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="register">
</div>

<!-- Right Side -->
<div class="right-side">

<h2>Create Account</h2>

{% if messages %}
{% for m in messages %}
<div class="alert alert-warning alert-dismissible fade show" role="alert">
{{ m }}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label class="form-label">Full Name</label>
<div class="input-box">
<i class="bi bi-person-fill"></i>
<input type="text" name="name" placeholder="Enter your full name" required>
</div>
</div>

<div class="form-group">
<label class="form-label">Email Address</label>
<div class="input-box">
<i class="bi bi-envelope-fill"></i>
<input type="email" name="email" placeholder="Enter your email" required>
</div>
</div>

<div class="form-group">
<label class="form-label">Phone Number</label>
<div class="input-box">
<i class="bi bi-telephone-fill"></i>
<input type="number" name="contactno" placeholder="Enter phone number" required>
</div>
</div>

<div class="form-group">
<label class="form-label">Password</label>
<div class="input-box">
<i class="bi bi-lock-fill"></i>
<input type="password" name="password" placeholder="Enter password" required>
</div>
</div>

<div class="form-group">
<label class="form-label">Confirm Password</label>
<div class="input-box">
<i class="bi bi-shield-lock-fill"></i>
<input type="password" name="cpassword" placeholder="Confirm password" required>
</div>
</div>

<button type="submit" class="btn-register">Register Now</button>

<div class="login-link">
Already have an account? <a href="{% url 'login' %}">Login</a>
</div>

</form>

</div>
</div>

<script src="{% static 'js/bootstrap.bundle.js' %}"></script>
</body>
</html>
